<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnferIA - Termos Técnicos</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Ícones Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        textarea { outline: none; }
        .hidden-element { display: none !important; }
        .force-uppercase { text-transform: uppercase; }
        /* Scrollbar customizada para as opções */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        /* Animação do campo de API */
        .api-pulse { border: 2px solid #14b8a6; animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(20, 184, 166, 0); }
            100% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0); }
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 font-sans selection:bg-teal-200">

    <!-- Header -->
    <header class="bg-teal-700 text-white shadow-md">
        <div class="container mx-auto px-4 py-4 max-w-6xl flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-lg">
                    <i data-lucide="stethoscope" class="text-teal-50 w-6 h-6 sm:w-8 sm:h-8"></i>
                </div>
                <div>
                    <h1 class="text-xl sm:text-2xl font-bold tracking-wide uppercase">EnferIA Termos Técnicos</h1>
                    <p class="text-teal-100 text-[10px] sm:text-xs font-medium uppercase tracking-wider">Padrão Ministério da Saúde</p>
                </div>
            </div>
            
            <!-- Campo de Chave de API -->
            <div class="w-full sm:w-auto flex flex-col gap-1">
                <label for="api-key-input" class="text-[10px] uppercase font-bold text-teal-100 ml-1">Chave de API Gemini</label>
                <div class="relative">
                    <input 
                        type="password" 
                        id="api-key-input" 
                        placeholder="COLE SUA CHAVE AQUI" 
                        class="w-full sm:w-64 bg-teal-800 border border-teal-600 text-white text-xs rounded-lg px-3 py-2 focus:ring-2 focus:ring-white focus:outline-none placeholder:text-teal-400 uppercase font-mono"
                    >
                    <i data-lucide="key" class="absolute right-2.5 top-2 w-3.5 h-3.5 text-teal-400"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-6 md:py-8 max-w-6xl">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            
            <!-- Painel Esquerdo: Input (Ocupa 5 colunas em telas grandes) -->
            <div class="lg:col-span-5 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full sticky top-4">
                <div class="bg-slate-100/50 border-b border-slate-200 px-6 py-4 flex justify-between items-center">
                    <h2 class="font-bold text-slate-700 uppercase tracking-wide flex items-center gap-2 text-sm sm:text-base">
                        Relato e Medicações
                    </h2>
                    <button id="clear-btn" class="text-slate-400 hover:text-teal-600 transition-colors flex items-center gap-1 text-[10px] font-bold uppercase">
                        <i data-lucide="refresh-cw" class="w-3 h-3"></i> Limpar
                    </button>
                </div>
                <div class="p-4 md:p-6 flex-grow flex flex-col">
                    <textarea
                        id="symptoms-input"
                        class="w-full h-48 lg:h-96 p-3 md:p-4 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 resize-none force-uppercase text-base md:text-lg text-slate-700 placeholder:text-slate-400 font-medium leading-relaxed"
                        placeholder="EX: PACIENTE COM DOR DE CABEÇA FORTE E VONTADE DE VOMITAR. DEI DIPIRONA NA VEIA E PLASIL NO MÚSCULO CONFORME RECEITA..."
                    ></textarea>
                    
                    <button
                        id="translate-btn"
                        disabled
                        class="mt-4 w-full py-4 px-6 rounded-lg font-bold text-white tracking-wider uppercase flex items-center justify-center gap-2 transition-all bg-slate-300 cursor-not-allowed"
                    >
                        <i data-lucide="refresh-cw" id="btn-spinner" class="w-5 h-5 animate-spin hidden-element"></i>
                        <span id="btn-text">GERAR EVOLUÇÕES</span>
                        <i data-lucide="arrow-right" id="btn-arrow" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- Painel Direito: Output das 3 Opções (Ocupa 7 colunas em telas grandes) -->
            <div class="lg:col-span-7 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full min-h-[30rem]">
                <div class="bg-teal-50 border-b border-teal-100 px-6 py-4 flex justify-between items-center">
                    <h2 class="font-bold text-teal-800 uppercase tracking-wide flex items-center gap-2 text-sm sm:text-base">
                        Opções de Evolução de Enfermagem
                    </h2>
                    <span class="text-[10px] font-bold text-teal-600 uppercase bg-teal-100 px-2 py-1 rounded-full">ESCOLHA A MELHOR</span>
                </div>
                
                <div class="p-4 md:p-6 flex-grow flex flex-col relative">
                    <!-- Alerta de Chave Faltante -->
                    <div id="key-warning" class="mb-4 p-3 bg-amber-50 border border-amber-200 rounded-lg flex items-start gap-2 text-amber-700">
                        <i data-lucide="info" class="w-4 h-4 flex-shrink-0 mt-0.5"></i>
                        <p class="text-[10px] font-bold uppercase">INSIRA SUA CHAVE DE API NO TOPO DA PÁGINA PARA COMEÇAR.</p>
                    </div>

                    <!-- Mensagem de Erro -->
                    <div id="error-container" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg flex items-start gap-3 text-red-700 hidden-element">
                        <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0 mt-0.5"></i>
                        <p id="error-text" class="text-xs font-bold uppercase leading-relaxed"></p>
                    </div>

                    <!-- Container onde as 3 opções serão injetadas -->
                    <div id="options-container" class="w-full flex-grow flex flex-col gap-4 custom-scrollbar overflow-y-auto max-h-[40rem] pb-4">
                        
                        <!-- Estado Vazio Inicial -->
                        <div id="empty-state" class="w-full h-full min-h-[16rem] flex flex-col items-center justify-center text-slate-300 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50/50">
                            <i data-lucide="clipboard-list" class="w-12 h-12 mb-3 opacity-50"></i>
                            <p class="font-bold uppercase text-sm tracking-wider">A IA GERARÁ 3 OPÇÕES DIFERENTES...</p>
                        </div>
                        
                    </div>
                        
                    <!-- Overlay de Carregamento -->
                    <div id="loading-overlay" class="absolute inset-0 bg-white/90 backdrop-blur-sm rounded-b-xl flex items-center justify-center hidden-element z-10">
                        <div class="flex flex-col items-center gap-4 text-teal-600 bg-white p-6 rounded-2xl shadow-xl border border-teal-100">
                            <i data-lucide="cpu" class="w-10 h-10 animate-pulse text-teal-500"></i>
                            <div class="flex items-center gap-2">
                                <i data-lucide="refresh-cw" class="w-4 h-4 animate-spin"></i>
                                <span id="loading-text" class="font-bold tracking-widest uppercase text-xs">ANALISANDO RELATO...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <script>
        lucide.createIcons();

        const inputEl = document.getElementById('symptoms-input');
        const optionsContainer = document.getElementById('options-container');
        const emptyState = document.getElementById('empty-state');
        const apiKeyInput = document.getElementById('api-key-input');
        const translateBtn = document.getElementById('translate-btn');
        const clearBtn = document.getElementById('clear-btn');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');
        const errorContainer = document.getElementById('error-container');
        const errorText = document.getElementById('error-text');
        const keyWarning = document.getElementById('key-warning');

        const btnText = document.getElementById('btn-text');
        const btnSpinner = document.getElementById('btn-spinner');
        const btnArrow = document.getElementById('btn-arrow');

        // Carrega chave salva na sessão (se houver)
        const savedKey = sessionStorage.getItem('enferia_key');
        if (savedKey) {
            apiKeyInput.value = savedKey;
            keyWarning.classList.add('hidden-element');
        } else {
            apiKeyInput.classList.add('api-pulse');
        }

        // Monitora entrada da API Key
        apiKeyInput.addEventListener('input', (e) => {
            if (e.target.value.trim().length > 5) {
                apiKeyInput.classList.remove('api-pulse');
                keyWarning.classList.add('hidden-element');
                sessionStorage.setItem('enferia_key', e.target.value.trim());
            } else {
                apiKeyInput.classList.add('api-pulse');
                keyWarning.classList.remove('hidden-element');
            }
            validateButton();
        });

        function validateButton() {
            const hasText = inputEl.value.trim().length > 0;
            const hasKey = apiKeyInput.value.trim().length > 5;
            
            if (hasText && hasKey) {
                translateBtn.disabled = false;
                translateBtn.classList.remove('bg-slate-300', 'cursor-not-allowed');
                translateBtn.classList.add('bg-teal-600', 'hover:bg-teal-700', 'shadow-md');
            } else {
                translateBtn.disabled = true;
                translateBtn.classList.add('bg-slate-300', 'cursor-not-allowed');
                translateBtn.classList.remove('bg-teal-600', 'hover:bg-teal-700', 'shadow-md');
            }
        }

        inputEl.addEventListener('input', (e) => {
            const start = e.target.selectionStart;
            const end = e.target.selectionEnd;
            e.target.value = e.target.value.toUpperCase();
            e.target.setSelectionRange(start, end);
            validateButton();
        });

        clearBtn.addEventListener('click', () => {
            inputEl.value = '';
            // Restaura o painel direito para o estado vazio
            optionsContainer.innerHTML = '';
            optionsContainer.appendChild(emptyState);
            emptyState.classList.remove('hidden-element');
            errorContainer.classList.add('hidden-element');
            validateButton();
        });

        // Função global para copiar um card específico
        window.copyOption = function(btnId, textToCopy) {
            const tempTextArea = document.createElement("textarea");
            tempTextArea.value = textToCopy;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            document.execCommand('copy');
            document.body.removeChild(tempTextArea);

            const btn = document.getElementById(btnId);
            const originalHtml = btn.innerHTML;
            
            btn.innerHTML = `<i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i> COPIADO!`;
            btn.classList.replace('text-teal-700', 'text-white');
            btn.classList.replace('bg-teal-50', 'bg-teal-600');
            btn.classList.replace('hover:bg-teal-100', 'hover:bg-teal-700');
            lucide.createIcons();

            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.classList.replace('text-white', 'text-teal-700');
                btn.classList.replace('bg-teal-600', 'bg-teal-50');
                btn.classList.replace('hover:bg-teal-700', 'hover:bg-teal-100');
                lucide.createIcons();
            }, 2000);
        };

        // Função para desenhar os Cards no HTML
        function renderOptionCards(opt1, opt2, opt3) {
            emptyState.classList.add('hidden-element');
            optionsContainer.innerHTML = ''; // Limpa tudo

            const optionsData = [
                { id: 'opt1', title: 'OPÇÃO 1: DIRETA E OBJETIVA', badgeClass: 'bg-emerald-100 text-emerald-800', borderClass: 'border-emerald-200', text: opt1 },
                { id: 'opt2', title: 'OPÇÃO 2: PADRÃO E RECOMENDADA', badgeClass: 'bg-blue-100 text-blue-800', borderClass: 'border-blue-200', text: opt2 },
                { id: 'opt3', title: 'OPÇÃO 3: DETALHADA E SISTEMATIZADA', badgeClass: 'bg-purple-100 text-purple-800', borderClass: 'border-purple-200', text: opt3 }
            ];

            optionsData.forEach(opt => {
                // Escapa as aspas simples para não quebrar a string no onclick
                const safeText = opt.text.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                
                const card = document.createElement('div');
                card.className = `flex flex-col bg-white border ${opt.borderClass} rounded-xl shadow-sm overflow-hidden transition-all hover:shadow-md`;
                card.innerHTML = `
                    <div class="flex justify-between items-center px-4 py-3 bg-slate-50 border-b ${opt.borderClass}">
                        <span class="text-xs font-black uppercase tracking-wider ${opt.badgeClass} px-2 py-1 rounded-md">
                            ${opt.title}
                        </span>
                        <button id="btn-${opt.id}" onclick="copyOption('btn-${opt.id}', '${safeText}')" class="flex items-center gap-1.5 text-[10px] font-bold uppercase transition-colors px-3 py-1.5 rounded-lg bg-teal-50 border border-teal-200 text-teal-700 hover:bg-teal-100 active:scale-95">
                            <i data-lucide="copy" class="w-3.5 h-3.5"></i> COPIAR
                        </button>
                    </div>
                    <div class="p-4">
                        <p class="text-slate-800 text-sm md:text-base font-medium leading-relaxed uppercase whitespace-pre-wrap">${opt.text}</p>
                    </div>
                `;
                optionsContainer.appendChild(card);
            });
            
            // Renderiza ícones injetados
            lucide.createIcons();
        }

        translateBtn.addEventListener('click', async () => {
            const inputText = inputEl.value.trim();
            const key = apiKeyInput.value.trim();
            if (!inputText || !key) return;

            // Prepara a UI para o carregamento
            inputEl.disabled = true;
            translateBtn.disabled = true;
            btnText.innerText = 'CONECTANDO...';
            btnSpinner.classList.remove('hidden-element');
            btnArrow.classList.add('hidden-element');
            loadingOverlay.classList.remove('hidden-element');
            errorContainer.classList.add('hidden-element');

            try {
                // PASSO 1: AUTO-DESCOBERTA DE MODELOS COM RETRY
                loadingText.innerText = 'VALIDANDO ACESSO...';
                const modelsUrl = `https://generativelanguage.googleapis.com/v1beta/models?key=${key}`;
                const modelsRes = await fetch(modelsUrl);
                
                if (!modelsRes.ok) {
                    const errData = await modelsRes.json();
                    throw new Error(`FALHA NA CHAVE: ${errData.error?.message || modelsRes.status}`);
                }
                
                const modelsData = await modelsRes.json();
                const availableModels = modelsData.models.filter(m => 
                    m.supportedGenerationMethods && 
                    m.supportedGenerationMethods.includes("generateContent") && 
                    m.name.includes("gemini")
                );

                if (availableModels.length === 0) {
                    throw new Error("SUA CHAVE É VÁLIDA, MAS NÃO TEM ACESSO A NENHUM MODELO GEMINI.");
                }

                const targetModelString = 
                    availableModels.find(m => m.name.includes("gemini-1.5-flash"))?.name || 
                    availableModels.find(m => m.name.includes("gemini-1.5-pro"))?.name || 
                    availableModels.find(m => m.name.includes("gemini-1.0"))?.name || 
                    availableModels[0].name;

                // PASSO 2: FAZER A TRADUÇÃO COM TENTATIVAS AUTOMÁTICAS (EXPONENTIAL BACKOFF)
                loadingText.innerText = 'CRIANDO 3 OPÇÕES DE EVOLUÇÃO...';
                btnText.innerText = 'PROCESSANDO...';

                const systemPrompt = `VOCÊ É UM ENFERMEIRO AUDITOR. REESCREVA O TEXTO RECEBIDO EM ANOTAÇÕES DE ENFERMAGEM TÉCNICAS (PADRÃO MS).
                DIRETRIZES GERAIS: Traduza jargões de sintomas para termos técnicos. Padronize a administração de medicamentos (ex: "na veia" = EV, "no músculo" = IM, "pela boca" = VO).
                
                MUITO IMPORTANTE: VOCÊ DEVE CRIAR EXATAMENTE 3 VERSÕES DIFERENTES DO TEXTO E ENVOLVÊ-LAS NAS TAGS EXATAS ABAIXO.

                FORMATE SUA RESPOSTA ESTRITAMENTE ASSIM:
                [OPCAO_1]
                (Escreva aqui a Opção 1: Uma versão muito curta, direta e objetiva, focada apenas nos fatos cruciais.)
                [/OPCAO_1]
                [OPCAO_2]
                (Escreva aqui a Opção 2: Uma versão padrão, equilibrada, com bom nível de detalhes para a rotina normal.)
                [/OPCAO_2]
                [OPCAO_3]
                (Escreva aqui a Opção 3: Uma versão extremamente detalhada, sistematizada, rica e descritiva.)
                [/OPCAO_3]

                REGRAS: 
                - NÃO DEVOLVA NENHUM TEXTO FORA DAS TAGS [OPCAO_X].
                - NÃO USE MARKDOWN (SEM ASTERISCOS OU NEGRITO).
                - TUDO EM LETRAS MAIÚSCULAS.`;

                const payload = {
                    contents: [
                        { 
                            role: "user", 
                            parts: [{ text: `INSTRUÇÃO: ${systemPrompt}\n\nRELATO DO PACIENTE/AÇÃO: ${inputText}` }] 
                        }
                    ]
                };

                const generateUrl = `https://generativelanguage.googleapis.com/v1beta/${targetModelString}:generateContent?key=${key}`;
                
                let generateRes;
                let generateData;
                let success = false;
                const maxRetries = 5; // Tenta até 5 vezes em caso de falha no servidor
                const baseDelay = 2000; // Tempo base de 2 segundos

                for (let attempt = 0; attempt < maxRetries; attempt++) {
                    try {
                        if (attempt > 0) {
                            loadingText.innerText = `SISTEMA OCUPADO. TENTATIVA ${attempt + 1} DE ${maxRetries}...`;
                        }

                        generateRes = await fetch(generateUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        generateData = await generateRes.json();

                        if (generateRes.ok) {
                            success = true;
                            break; // Se deu certo (código 200), sai do loop
                        }

                        // Verifica se é um erro de servidor (503 Service Unavailable / 429 Too Many Requests)
                        if (generateRes.status >= 500 || generateRes.status === 429) {
                            if (attempt === maxRetries - 1) {
                                throw new Error(generateData.error?.message || "O servidor da inteligência artificial está sobrecarregado no momento. Tente novamente mais tarde.");
                            }
                            // Cálculo do Recuo Exponencial (Espera 2s, 4s, 8s, 16s...)
                            const delay = baseDelay * Math.pow(2, attempt);
                            loadingText.innerText = `ALTA DEMANDA. AGUARDANDO ${delay / 1000}s...`;
                            await new Promise(resolve => setTimeout(resolve, delay));
                            continue; // Volta e tenta de novo
                        } else {
                            // Erros como credenciais erradas ou bloqueios irreversíveis não devem ser retentados
                            throw new Error(generateData.error?.message || `Erro HTTP ${generateRes.status}`);
                        }

                    } catch (err) {
                        // Se for o último loop, devolve o erro definitivo
                        if (attempt === maxRetries - 1 || (!err.message.includes("fetch") && !err.message.includes("sobrecarregado"))) {
                            throw err;
                        }
                        // Erro de rede (fetch falhou) - tenta novamente
                        const delay = baseDelay * Math.pow(2, attempt);
                        loadingText.innerText = `FALHA NA CONEXÃO. RECONECTANDO EM ${delay / 1000}s...`;
                        await new Promise(resolve => setTimeout(resolve, delay));
                    }
                }

                if (!success || !generateData) {
                    throw new Error("Não foi possível gerar a tradução após várias tentativas.");
                }

                let aiResponseText = generateData.candidates?.[0]?.content?.parts?.[0]?.text || "";
                aiResponseText = aiResponseText.replace(/[*#]/g, '').trim().toUpperCase();

                // PASSO 3: EXTRAIR AS 3 OPÇÕES USANDO EXPRESSÕES REGULARES
                const opt1Match = aiResponseText.match(/\[OPCAO_1\]([\s\S]*?)\[\/OPCAO_1\]/i);
                const opt2Match = aiResponseText.match(/\[OPCAO_2\]([\s\S]*?)\[\/OPCAO_2\]/i);
                const opt3Match = aiResponseText.match(/\[OPCAO_3\]([\s\S]*?)\[\/OPCAO_3\]/i);

                let opt1, opt2, opt3;

                if (opt1Match && opt2Match && opt3Match) {
                    opt1 = opt1Match[1].trim();
                    opt2 = opt2Match[1].trim();
                    opt3 = opt3Match[1].trim();
                } else {
                    // Fallback de segurança: se a IA ignorou as tags, divide o texto rudimentarmente ou avisa o erro
                    console.warn("A IA não retornou as tags corretas. Texto puro:", aiResponseText);
                    opt1 = "A INTELIGÊNCIA ARTIFICIAL NÃO FORMATOU A RESPOSTA CORRETAMENTE. RESULTADO ÚNICO GERADO:\n\n" + aiResponseText;
                    opt2 = "A INTELIGÊNCIA ARTIFICIAL NÃO FORMATOU A RESPOSTA CORRETAMENTE. VEJA A OPÇÃO 1.";
                    opt3 = "A INTELIGÊNCIA ARTIFICIAL NÃO FORMATOU A RESPOSTA CORRETAMENTE. VEJA A OPÇÃO 1.";
                }

                // Renderiza na tela
                renderOptionCards(opt1, opt2, opt3);
                
            } catch (err) {
                errorText.innerText = err.message;
                errorContainer.classList.remove('hidden-element');
                console.error(err);
            } finally {
                inputEl.disabled = false;
                loadingOverlay.classList.add('hidden-element');
                btnText.innerText = 'GERAR EVOLUÇÕES';
                btnSpinner.classList.add('hidden-element');
                btnArrow.classList.remove('hidden-element');
                validateButton();
            }
        });

    </script>
</body>
</html>
